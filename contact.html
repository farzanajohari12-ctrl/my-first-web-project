<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #007bff; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input, textarea { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h1>Contact Me</h1>
    <p>Feel free to reach out using the form below!</p>

    <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="2a7cfce6-82c2-49ee-a522-ce2a0f131829">

        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="last_name" placeholder="Last Name" required>

        <input type="email" name="email" placeholder="Email Address" required>

        <input type="tel" name="phone_number" placeholder="Phone Number">

        <input type="text" name="company_name" placeholder="Company Name">

        <input type="text" name="subject" placeholder="Your Subject" required>

        <textarea name="message" placeholder="Write Your Message" rows="5" required></textarea>

        <div class="g-recaptcha" data-sitekey="6LeMSnksAAAAAGuHZ-Tx7dbKsxTXOZXzjgFU2i57"></div>

        <button type="submit">Send a Message</button>
    </form>

</body>
</html>
